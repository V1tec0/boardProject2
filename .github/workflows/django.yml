name: Test Board API

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: windows-latest
    strategy:
      max-parallel: 4
      matrix:
        python-version: [3.11.2]
        pip-versions: [22.3.1]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Reinstall pip
      run: |
        python.exe -m pip install --upgrade pip==${{ matrix.pip-versions }}
    - name: Run Tests
      run: |
        venv/Scripts/activate
        cd tableProject
        python manage.py runserver
